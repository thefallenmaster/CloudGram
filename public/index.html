<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudGram - Premium Image Hosting</title>
    <meta name="description" content="Secure, fast, and beautiful image hosting powered by Telegram.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header>
            <h1 class="logo">Cloud<span>Gram</span></h1>
            <p class="subtitle">Secure, limitless image hosting powered by the Telegram Bot API</p>
        </header>

        <section class="upload-section">
            <div id="drop-zone" class="drop-zone">
                <input type="file" id="file-input" accept="image/*" hidden>
                <div class="upload-content">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h2>Drag & Drop your image here</h2>
                    <p>or</p>
                    <button class="btn primary-btn" id="browse-btn">Browse Files</button>
                </div>
                
                <div class="loading-state hidden" id="loading-state">
                    <div class="spinner"></div>
                    <p>Uploading to CloudGram...</p>
                </div>
            </div>
        </section>

        <section id="result-section" class="result-section hidden">
            <div class="result-card glass-panel">
                <h3>Upload Successful! ✨</h3>
                
                <div class="preview-container">
                    <img id="preview-image" src="" alt="Uploaded preview">
                </div>

                <div class="link-container">
                    <label for="image-url">Image URL</label>
                    <div class="input-group">
                        <input type="text" id="image-url" readonly>
                        <button class="btn secondary-btn" id="copy-btn">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            Copy
                        </button>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap;">
                    <button class="btn outline-btn" id="upload-another-btn">Upload Another Image</button>
                    <button class="btn outline-btn" id="show-embed-btn">Embed Code</button>
                </div>

                <div id="embed-container" class="link-container hidden" style="margin-top: 1.5rem;">
                    <label for="embed-code">HTML Embed Code</label>
                    <div class="input-group">
                        <input type="text" id="embed-code" readonly>
                        <button class="btn secondary-btn" id="copy-embed-btn">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            Copy
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
